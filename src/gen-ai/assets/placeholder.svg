<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2718;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)" rx="16" />
  <rect width="600" height="400" fill="url(#shine)" rx="16" />

  <!-- Soccer field lines -->
  <rect x="60" y="60" width="480" height="280" fill="none" stroke="#2d6a4f" stroke-width="2" rx="4" opacity="0.5" />
  <line x1="300" y1="60" x2="300" y2="340" stroke="#2d6a4f" stroke-width="1.5" opacity="0.4" />
  <circle cx="300" cy="200" r="50" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.4" />
  <circle cx="300" cy="200" r="3" fill="#2d6a4f" opacity="0.6" />

  <!-- Trophy icon -->
  <g transform="translate(260, 80)">
    <text font-size="52" text-anchor="middle" x="40" y="55">🏆</text>
  </g>

  <!-- Main title -->
  <text x="300" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="800"
    text-anchor="middle" fill="#ffffff" letter-spacing="2">soccer-zone</text>

  <!-- Subtitle -->
  <text x="300" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400"
    text-anchor="middle" fill="#74c69d" letter-spacing="4">AI GENERATED</text>

  <!-- Decorative line -->
  <line x1="180" y1="240" x2="420" y2="240" stroke="#74c69d" stroke-width="1" opacity="0.5" />

  <!-- Bottom text -->
  <text x="300" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="300"
    text-anchor="middle" fill="#95d5b2" opacity="0.8">⚽  powered by Gemini  ⚽</text>

  <!-- Corner decorations -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" />
  <circle cx="540" cy="60" r="20" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" />
  <circle cx="60" cy="340" r="20" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" />
  <circle cx="540" cy="340" r="20" fill="none" stroke="#2d6a4f" stroke-width="1.5" opacity="0.3" />
</svg>
