name: Deploy Lite (Firebase)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Soccer Lite
        env:
          VITE_LITE_MODE: true
          VITE_BASE_PATH: /
          VITE_DEFAULT_DATASET: prod
          VITE_ENABLE_PROD_DATASET: true
          VITE_STORAGE_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LITE_SUPER_PASSWORD: ${{ secrets.VITE_LITE_SUPER_PASSWORD }}
        run: npm run lite:build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project shpivak-soccer-lite --token ${{ secrets.FIREBASE_TOKEN }}
