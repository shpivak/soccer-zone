# Deploy Soccer Lite to GitHub Pages.
#
# This workflow lives in the soccer-zone repo but is intended to be copied into
# a dedicated "soccer-lite" GitHub repo where it will deploy to
# https://<owner>.github.io/soccer-lite/.
#
# Key differences from deploy-pages.yml:
#   - VITE_LITE_MODE=true          — enables lite mode branching in the app
#   - VITE_SUPABASE_*_SCHEMA       — points at the soccerlite_* schemas
#   - No VITE_COACHES              — lite mode has no coach auth
#   - No VITE_GEMINI_API_KEY       — AI image generation is disabled in lite

name: Deploy Pages (Lite)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-lite
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build site (lite)
        env:
          VITE_LITE_MODE: true
          VITE_DEFAULT_DATASET: prod
          VITE_ENABLE_PROD_DATASET: true
          VITE_ALLOW_PROD_WRITES: ${{ secrets.VITE_ALLOW_PROD_WRITES }}
          VITE_STORAGE_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_DEV_SCHEMA: soccerlite_dev
          VITE_SUPABASE_TEST_SCHEMA: soccerlite_test
          VITE_SUPABASE_PROD_SCHEMA: soccerlite_prod
          # REQUIRED: set VITE_LITE_SUPER_PASSWORD as a GH repo secret.
          # Without it no new league can be created via the setup screen.
          VITE_LITE_SUPER_PASSWORD: ${{ secrets.VITE_LITE_SUPER_PASSWORD }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
